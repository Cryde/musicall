services:
    # OpenAI Platform — symfony/ai 0.9: PlatformFactory was renamed Factory
    # and the createPlatform signature reordered $eventDispatcher from
    # position 3 to 6. We rely on named arguments here so the rename
    # doesn't accidentally misbind.
    Symfony\AI\Platform\PlatformInterface:
        factory: ['Symfony\AI\Platform\Bridge\OpenAi\Factory', 'createPlatform']
        arguments:
            $apiKey: '%env(OPEN_AI_KEY)%'
            $httpClient: '@http_client'
            $eventDispatcher: '@event_dispatcher'

    # Musician Filter Agent
    app.ai.agent.musician_filter:
        class: Symfony\AI\Agent\Agent
        arguments:
            $platform: '@Symfony\AI\Platform\PlatformInterface'
            $model: 'gpt-4.1?temperature=0.5'
            $inputProcessors: []
            $outputProcessors: []
            $name: 'musician_filter'

    # Structured Output Event Subscriber
    Symfony\AI\Platform\StructuredOutput\PlatformSubscriber:
        tags:
            - { name: kernel.event_subscriber }
