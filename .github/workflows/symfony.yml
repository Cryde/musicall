# https://help.github.com/en/actions
# from : https://www.strangebuzz.com/en/blog/setting-a-ci-cd-workflow-for-a-symfony-project-thanks-to-the-github-actions
name: MusicAll CI process
on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    backend:
        name: Backend (PHP ${{ matrix.php-versions }})
        runs-on: ubuntu-24.04
        services:
            mysql:
                image: mariadb:10.11
                env:
                    MYSQL_ROOT_PASSWORD: toor
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

        strategy:
            fail-fast: true
            matrix:
                php-versions: ['8.4']
        steps:
            # —— Setup ——————————————————————————————————————————————————————————————
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP, extensions and composer
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
                  extensions: mbstring, ctype, intl, pdo_mysql, gd, xml
                  coverage: pcov

            # —— Composer ——————————————————————————————————————————————————————————
            - name: Get Composer Cache Directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --no-progress --prefer-dist --optimize-autoloader

            # —— Symfony ———————————————————————————————————————————————————————————
            - name: Check the Symfony console
              run: bin/console about

            # —— Static analysis ———————————————————————————————————————————————————
            - name: Static Analysis using PHPStan
              run: vendor/bin/phpstan analyse --no-progress --memory-limit=600M

            # —— Test database —————————————————————————————————————————————————————
            - name: Create test database
              env:
                  APP_ENV: test
              run: |
                  bin/console -n doctrine:database:create --if-not-exists
                  bin/console -n doctrine:schema:create
                  bin/console -n doctrine:schema:validate

            # —— Tests —————————————————————————————————————————————————————————————
            - name: Run tests and collect coverage
              env:
                  APP_ENV: test
              run: vendor/bin/phpunit --coverage-clover ./coverage.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    frontend:
        name: Frontend (Node ${{ matrix.node-versions }})
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: true
            matrix:
                node-versions: ['22']
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-versions }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint (Biome)
              run: npm run lint

            - name: Build (Vite)
              run: npm run build
